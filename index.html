<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products to Create • Full List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        
        .card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        
        thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #18181b;
            box-shadow: 0 1px 0 #3f3f46;
        }
        .done { text-decoration: line-through; opacity: 0.65; }
        .zero { color: #52525b; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-semibold tracking-tight">Products to Create</h1>
                <p class="text-zinc-400 mt-1">Full list from Google Sheet • Check off as you go</p>
            </div>
            <div class="flex gap-x-4">
                <button onclick="loadData()" class="flex items-center gap-x-2 bg-white text-zinc-900 px-5 py-3 rounded-2xl font-medium hover:bg-amber-400">
                    Refresh Data
                </button>
                <button onclick="clearAllProgress()" class="text-sm text-zinc-400 hover:text-red-400">Clear Progress</button>
                <a href="https://docs.google.com/spreadsheets/d/16ccPeVmZ6DNHfxqRdhOfvvza2HRm_WKJcVAeg7DudGc/edit" target="_blank" class="text-sm text-zinc-400 hover:text-white">Open Sheet ↗</a>
            </div>
        </div>

        <!-- Summary -->
        <div id="summary" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-10"></div>

        <!-- Search -->
        <div class="mb-6">
            <input id="searchInput" type="text" placeholder="Search by code or product name..." 
                   onkeyup="filterTable()" 
                   class="w-full bg-zinc-900 border border-zinc-800 focus:border-amber-400 rounded-3xl px-6 py-4 text-lg outline-none">
        </div>

        <div id="loading" class="hidden flex justify-center py-12 text-amber-400">
            Loading full list from Google Sheet...
        </div>

        <div id="tableContainer" class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 max-h-[75vh] overflow-auto">
            <table class="w-full">
                <thead>
                    <tr class="border-b border-zinc-700 bg-zinc-950">
                        <th class="px-8 py-6 text-left font-medium text-amber-400 w-32">KODS</th>
                        <th class="px-8 py-6 text-left font-medium text-amber-400">Kafija / Product</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">LV</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">EE</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">LT</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">FR</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">PT</th>
                        <th class="px-8 py-6 text-center font-medium text-amber-400 w-24">KOPĀ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-zinc-800"></tbody>
            </table>
        </div>

        <div id="emptyState" class="hidden text-center py-16 text-zinc-400">
            No products found.
        </div>

        <div class="mt-8 text-center text-xs text-zinc-500">
            All rows from the sheet are shown now • Progress saved in your browser
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/16ccPeVmZ6DNHfxqRdhOfvvza2HRm_WKJcVAeg7DudGc/export?format=csv";
        let allProducts = [];
        let progress = {};

        function loadProgress() {
            const saved = localStorage.getItem('productProgress');
            if (saved) progress = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem('productProgress', JSON.stringify(progress));
        }

        function isDone(kods, country) {
            return !!progress[`${kods}-${country}`];
        }

        function toggleDone(kods, country, checkbox) {
            const key = `${kods}-${country}`;
            progress[key] = checkbox.checked;
            saveProgress();
            updateRowStyle(kods);
        }

        function updateRowStyle(kods) {
            const row = document.querySelector(`tr[data-kods="${kods}"]`);
            if (!row) return;
            const countries = ['LV','EE','LT','FR','PT'];
            const allDone = countries.every(c => isDone(kods, c));
            allDone ? row.classList.add('done') : row.classList.remove('done');
        }

        async function loadData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('tableContainer').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            try {
                const res = await fetch(CSV_URL);
                const csv = await res.text();

                Papa.parse(csv, {
                    header: false,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        const dataRows = rows.slice(3); // skip the top header rows

                        allProducts = [];

                        dataRows.forEach(row => {
                            const kods = (row[0] || '').trim();
                            if (!kods || !kods.startsWith('KP-')) return;

                            const kafija = (row[1] || '').trim();
                            const lv = parseFloat(row[2]) || 0;
                            const ee = parseFloat(row[3]) || 0;
                            const lt = parseFloat(row[4]) || 0;
                            const fr = parseFloat(row[5]) || 0;
                            const pt = parseFloat(row[6]) || 0;
                            const kopa = parseFloat(row[8]) || 0;

                            allProducts.push({ kods, kafija, lv, ee, lt, fr, pt, kopa });
                        });

                        renderSummary();
                        renderTable(allProducts);
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('tableContainer').classList.remove('hidden');
                    }
                });
            } catch (e) {
                alert("Could not load the sheet. Make sure it's publicly viewable.");
                console.error(e);
            }
        }

        function renderSummary() {
            const container = document.getElementById('summary');
            container.innerHTML = '';

            const totals = allProducts.reduce((acc, p) => {
                acc.LV += p.lv; acc.EE += p.ee; acc.LT += p.lt;
                acc.FR += p.fr; acc.PT += p.pt; acc.TOTAL += p.kopa;
                return acc;
            }, {LV:0, EE:0, LT:0, FR:0, PT:0, TOTAL:0});

            const items = [
                {code: 'LV', name: 'Latvia', val: totals.LV},
                {code: 'EE', name: 'Estonia', val: totals.EE},
                {code: 'LT', name: 'Lithuania', val: totals.LT},
                {code: 'FR', name: 'France', val: totals.FR},
                {code: 'PT', name: 'Portugal', val: totals.PT},
                {code: 'KOPĀ', name: 'Total', val: totals.TOTAL, highlight: true}
            ];

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = `bg-zinc-900 rounded-3xl p-6 card ${item.highlight ? 'ring-2 ring-amber-400' : ''}`;
                div.innerHTML = `
                    <div class="text-xs tracking-widest text-zinc-400">${item.code}</div>
                    <div class="font-medium mt-1">${item.name}</div>
                    <div class="text-4xl font-semibold mt-4 ${item.highlight ? 'text-amber-400' : 'text-white'}">${Math.round(item.val)}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderTable(products) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (products.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-zinc-800/70 transition-colors";
                tr.dataset.kods = p.kods;

                let html = `
                    <td class="px-8 py-5 font-mono text-amber-400">${p.kods}</td>
                    <td class="px-8 py-5">${p.kafija || '-'}</td>
                `;

                const countries = [
                    {c: 'LV', v: p.lv},
                    {c: 'EE', v: p.ee},
                    {c: 'LT', v: p.lt},
                    {c: 'FR', v: p.fr},
                    {c: 'PT', v: p.pt}
                ];

                countries.forEach(({c, v}) => {
                    const checked = isDone(p.kods, c) ? 'checked' : '';
                    html += `
                        <td class="px-6 py-5 text-center">
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-sm font-medium ${v > 0 ? 'text-emerald-400' : 'zero'}">${v}</span>
                                ${v > 0 ? `
                                <input type="checkbox" ${checked}
                                    onchange="toggleDone('${p.kods}', '${c}', this)"
                                    class="w-5 h-5 accent-amber-400 cursor-pointer">
                                ` : '<span class="text-xs text-zinc-600">—</span>'}
                            </div>
                        </td>
                    `;
                });

                html += `<td class="px-8 py-5 text-center font-bold text-lg text-amber-400">${p.kopa}</td>`;
                tr.innerHTML = html;
                tbody.appendChild(tr);
                updateRowStyle(p.kods);
            });
        }

        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!term) {
                renderTable(allProducts);
                return;
            }
            const filtered = allProducts.filter(p => 
                p.kods.toLowerCase().includes(term) || 
                (p.kafija || '').toLowerCase().includes(term)
            );
            renderTable(filtered);
        }

        function clearAllProgress() {
            if (confirm("Clear ALL progress?")) {
                progress = {};
                saveProgress();
                renderTable(allProducts);
            }
        }

        window.onload = () => {
            loadProgress();
            loadData();
        };
    </script>
</body>
</html>
