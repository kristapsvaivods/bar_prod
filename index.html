<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products to Create</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        
        thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #18181b;
            box-shadow: 0 1px 0 #3f3f46;
        }
        .done { 
            text-decoration: line-through; 
            opacity: 0.65; 
        }
        .zero { color: #52525b; }

        @media (max-width: 640px) {
            th, td { 
                padding: 14px 8px !important; 
                font-size: 0.95rem;
            }
            .product-name {
                max-width: 240px;
                white-space: normal;
                line-height: 1.35;
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-6">
        
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-semibold tracking-tight">Products to Create</h1>
                <p class="text-zinc-400 text-sm">Full list • Check when done</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadData()" 
                        class="bg-white text-zinc-900 px-5 py-3 rounded-2xl font-medium hover:bg-amber-400 text-sm flex items-center gap-2">
                    Refresh
                </button>
                <button onclick="clearAllProgress()" 
                        class="text-sm text-zinc-400 hover:text-red-400">Clear All</button>
                <a href="https://docs.google.com/spreadsheets/d/16ccPeVmZ6DNHfxqRdhOfvvza2HRm_WKJcVAeg7DudGc/edit" 
                   target="_blank" 
                   class="text-sm text-zinc-400 hover:text-white">Open Sheet ↗</a>
            </div>
        </div>

        <div class="mb-6">
            <input id="searchInput" 
                   type="text" 
                   placeholder="Search product name..." 
                   onkeyup="filterTable()" 
                   class="w-full bg-zinc-900 border border-zinc-700 focus:border-amber-400 rounded-3xl px-6 py-4 outline-none text-base">
        </div>

        <div id="loading" class="hidden py-12 text-center text-amber-400">
            Loading all products from Google Sheet...
        </div>

        <div id="tableContainer" class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 overflow-auto max-h-[78vh]">
            <table class="w-full min-w-[620px]">
                <thead>
                    <tr class="border-b border-zinc-700 bg-zinc-950">
                        <th class="px-6 py-5 text-left font-medium text-amber-400">Kafija / Product</th>
                        <th class="px-4 py-5 text-center font-medium text-amber-400 w-16">LV</th>
                        <th class="px-4 py-5 text-center font-medium text-amber-400 w-16">EE</th>
                        <th class="px-4 py-5 text-center font-medium text-amber-400 w-16">LT</th>
                        <th class="px-4 py-5 text-center font-medium text-amber-400 w-16">FR</th>
                        <th class="px-4 py-5 text-center font-medium text-amber-400 w-16">PT</th>
                        <th class="px-6 py-5 text-center font-medium text-amber-400 w-20">KOPĀ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-zinc-800"></tbody>
            </table>
        </div>

        <div id="emptyState" class="hidden text-center py-20 text-zinc-400">
            No products found.
        </div>

        <div class="mt-8 text-center text-xs text-zinc-500">
            All products loaded • Progress saved in your browser
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/16ccPeVmZ6DNHfxqRdhOfvvza2HRm_WKJcVAeg7DudGc/export?format=csv";
        let allProducts = [];
        let progress = {};

        function loadProgress() {
            const saved = localStorage.getItem('productProgress');
            if (saved) progress = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem('productProgress', JSON.stringify(progress));
        }

        function isDone(kods, country) {
            return !!progress[`${kods}-${country}`];
        }

        function toggleDone(kods, country, checkbox) {
            progress[`${kods}-${country}`] = checkbox.checked;
            saveProgress();
            updateRowStyle(kods);
        }

        function updateRowStyle(kods) {
            const row = document.querySelector(`tr[data-kods="${kods}"]`);
            if (!row) return;
            const countries = ['LV','EE','LT','FR','PT'];
            const allDone = countries.every(c => isDone(kods, c));
            allDone ? row.classList.add('done') : row.classList.remove('done');
        }

        async function loadData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('tableContainer').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            try {
                const res = await fetch(CSV_URL);
                const csvText = await res.text();

                Papa.parse(csvText, {
                    header: false,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        const dataRows = rows.slice(3);   // ← Fixed: now starts correctly from first product

                        allProducts = [];

                        dataRows.forEach(row => {
                            const kods = (row[0] || '').toString().trim();
                            if (!kods || !kods.startsWith('KP-')) return;

                            const kafija = (row[1] || '').toString().trim();
                            const lv = parseFloat(row[2]) || 0;
                            const ee = parseFloat(row[3]) || 0;
                            const lt = parseFloat(row[4]) || 0;
                            const fr = parseFloat(row[5]) || 0;
                            const pt = parseFloat(row[6]) || 0;
                            const kopa = parseFloat(row[8]) || 0;

                            allProducts.push({ 
                                kods, 
                                kafija: kafija || "Unnamed Product", 
                                lv, ee, lt, fr, pt, 
                                kopa 
                            });
                        });

                        console.log(`Loaded ${allProducts.length} products`); // for debugging

                        renderTable(allProducts);
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('tableContainer').classList.remove('hidden');
                    }
                });
            } catch (e) {
                console.error(e);
                alert("Could not load the sheet. Please check the sharing settings (Anyone with the link can view).");
            }
        }

        function renderTable(products) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (products.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-zinc-800/70 transition-colors";
                tr.dataset.kods = p.kods;

                let html = `<td class="px-6 py-5 product-name">${p.kafija}</td>`;

                const countries = [
                    {c:'LV', v:p.lv}, {c:'EE', v:p.ee}, {c:'LT', v:p.lt},
                    {c:'FR', v:p.fr}, {c:'PT', v:p.pt}
                ];

                countries.forEach(({c, v}) => {
                    const checked = isDone(p.kods, c) ? 'checked' : '';
                    html += `
                        <td class="px-4 py-5 text-center">
                            <div class="flex flex-col items-center gap-1 min-h-[52px]">
                                <span class="text-base font-medium ${v > 0 ? 'text-emerald-400' : 'zero'}">${v}</span>
                                ${v > 0 ? `
                                <input type="checkbox" ${checked}
                                    onchange="toggleDone('${p.kods}', '${c}', this)"
                                    class="w-5 h-5 accent-amber-400">
                                ` : '<span class="text-xs text-zinc-600 mt-1">—</span>'}
                            </div>
                        </td>
                    `;
                });

                html += `<td class="px-6 py-5 text-center font-bold text-amber-400 text-lg">${p.kopa}</td>`;
                tr.innerHTML = html;
                tbody.appendChild(tr);
                updateRowStyle(p.kods);
            });
        }

        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = !term ? allProducts : allProducts.filter(p => 
                p.kafija.toLowerCase().includes(term)
            );
            renderTable(filtered);
        }

        function clearAllProgress() {
            if (confirm("Clear all progress?")) {
                progress = {};
                saveProgress();
                renderTable(allProducts);
            }
        }

        window.onload = () => {
            loadProgress();
            loadData();
        };
    </script>
</body>
</html>
