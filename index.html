<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products to Create • Live from Google Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        
        .card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        
        table { border-collapse: collapse; }
        thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #18181b;
            box-shadow: 0 1px 0 #3f3f46;
        }
        .done {
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-semibold tracking-tight">Products to Create</h1>
                <p class="text-zinc-400 mt-1">Live from Google Sheet • Check off completed items</p>
            </div>
            <div class="flex items-center gap-x-4">
                <button onclick="loadData()" 
                        class="flex items-center gap-x-2 bg-white text-zinc-900 px-5 py-3 rounded-2xl font-medium hover:bg-amber-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.058 11H1M12 3v2m0 16v2m9-9H15m-6 0a8 8 0 01-7.714-6.314M12 3a8 8 0 00-7.714 6.314" />
                    </svg>
                    Refresh Data
                </button>
                <button onclick="clearAllProgress()" 
                        class="text-sm text-zinc-400 hover:text-red-400 transition-colors">
                    Clear Progress
                </button>
                <a href="https://docs.google.com/spreadsheets/d/16ccPeVmZ6DNHfxqRdhOfvvza2HRm_WKJcVAeg7DudGc/edit" 
                   target="_blank"
                   class="text-sm text-zinc-400 hover:text-white flex items-center gap-x-1">
                    Open Sheet ↗
                </a>
            </div>
        </div>

        <!-- Summary Cards -->
        <div id="summary" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-10"></div>

        <!-- Search -->
        <div class="mb-6">
            <input 
                id="searchInput"
                type="text" 
                placeholder="Search by code or product name..."
                onkeyup="filterTable()"
                class="w-full bg-zinc-900 border border-zinc-800 focus:border-amber-400 rounded-3xl px-6 py-4 text-lg outline-none transition-colors">
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden flex items-center justify-center py-12">
            <div class="flex items-center gap-x-3 text-amber-400">
                <svg class="animate-spin h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span class="font-medium">Loading live data...</span>
            </div>
        </div>

        <!-- Table -->
        <div id="tableContainer" class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 max-h-[75vh] overflow-auto">
            <table class="w-full min-w-full">
                <thead>
                    <tr class="border-b border-zinc-700 bg-zinc-950">
                        <th class="px-8 py-6 text-left font-medium text-amber-400 w-32">KODS</th>
                        <th class="px-8 py-6 text-left font-medium text-amber-400">Kafija / Product</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">LV</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">EE</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">LT</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">FR</th>
                        <th class="px-6 py-6 text-center font-medium text-amber-400 w-20">PT</th>
                        <th class="px-8 py-6 text-center font-medium text-amber-400 w-24">KOPĀ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-zinc-800 text-sm"></tbody>
            </table>
        </div>

        <div id="emptyState" class="hidden text-center py-16">
            <p class="text-zinc-400 text-lg">No products need to be created right now.</p>
        </div>

        <div class="mt-8 text-center text-xs text-zinc-500">
            Progress is saved in your browser • Refresh the sheet to get latest numbers
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/16ccPeVmZ6DNHfxqRdhOfvvza2HRm_WKJcVAeg7DudGc/export?format=csv";
        let allProducts = [];
        let progress = {}; // key: "KP-XXXX-LV", value: true if done

        function loadProgress() {
            const saved = localStorage.getItem('productProgress');
            if (saved) progress = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem('productProgress', JSON.stringify(progress));
        }

        function isDone(kods, country) {
            return !!progress[`${kods}-${country}`];
        }

        function toggleDone(kods, country, checkbox) {
            const key = `${kods}-${country}`;
            progress[key] = checkbox.checked;
            saveProgress();
            
            // Optional: strike through the whole row if all amounts for this product are done
            updateRowStyle(kods);
        }

        function updateRowStyle(kods) {
            const row = document.querySelector(`tr[data-kods="${kods}"]`);
            if (!row) return;
            
            const countries = ['LV','EE','LT','FR','PT'];
            const allDone = countries.every(c => isDone(kods, c));
            
            if (allDone) {
                row.classList.add('done');
            } else {
                row.classList.remove('done');
            }
        }

        async function loadData() {
            const loading = document.getElementById('loading');
            const tableContainer = document.getElementById('tableContainer');
            const emptyState = document.getElementById('emptyState');
            
            loading.classList.remove('hidden');
            tableContainer.classList.add('hidden');
            emptyState.classList.add('hidden');

            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: false,
                    skipEmptyLines: true,
                    complete: function(results) {
                        const rows = results.data;
                        const dataRows = rows.slice(3); // skip header rows
                        
                        allProducts = [];
                        
                        dataRows.forEach(row => {
                            const kods = (row[0] || '').trim();
                            if (!kods || !kods.startsWith('KP-')) return;
                            
                            const kafija = (row[1] || '').trim();
                            const lv = parseFloat(row[2] || 0);
                            const ee = parseFloat(row[3] || 0);
                            const lt = parseFloat(row[4] || 0);
                            const fr = parseFloat(row[5] || 0);
                            const pt = parseFloat(row[6] || 0);
                            const kopa = parseFloat(row[8] || 0);
                            
                            if (kopa > 0) {
                                allProducts.push({ kods, kafija, lv, ee, lt, fr, pt, kopa });
                            }
                        });
                        
                        renderSummary();
                        renderTable(allProducts);
                        loading.classList.add('hidden');
                        tableContainer.classList.remove('hidden');
                    }
                });
            } catch (error) {
                console.error(error);
                loading.innerHTML = `<div class="text-red-400">Failed to load data. Please try again.</div>`;
            }
        }

        function renderSummary() {
            const container = document.getElementById('summary');
            container.innerHTML = '';
            
            const totals = allProducts.reduce((acc, p) => {
                acc.LV += p.lv; acc.EE += p.ee; acc.LT += p.lt;
                acc.FR += p.fr; acc.PT += p.pt; acc.TOTAL += p.kopa;
                return acc;
            }, {LV:0, EE:0, LT:0, FR:0, PT:0, TOTAL:0});
            
            const items = [
                {code:'LV', name:'Latvia', value: totals.LV},
                {code:'EE', name:'Estonia', value: totals.EE},
                {code:'LT', name:'Lithuania', value: totals.LT},
                {code:'FR', name:'France', value: totals.FR},
                {code:'PT', name:'Portugal', value: totals.PT},
                {code:'KOPĀ', name:'Total', value: totals.TOTAL, highlight:true}
            ];
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = `bg-zinc-900 rounded-3xl p-6 card ${item.highlight ? 'ring-2 ring-amber-400' : ''}`;
                div.innerHTML = `
                    <div class="text-xs tracking-widest text-zinc-400">${item.code}</div>
                    <div class="font-medium mt-1">${item.name}</div>
                    <div class="text-4xl font-semibold mt-4 ${item.highlight ? 'text-amber-400' : ''}">${Math.round(item.value)}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderTable(products) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if (products.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            
            products.forEach(product => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-zinc-800/70 transition-colors";
                tr.dataset.kods = product.kods;
                
                let html = `
                    <td class="px-8 py-5 font-mono font-medium text-amber-400">${product.kods}</td>
                    <td class="px-8 py-5">${product.kafija}</td>
                `;
                // LV to PT checkboxes
                const countries = [
                    {code:'LV', val: product.lv},
                    {code:'EE', val: product.ee},
                    {code:'LT', val: product.lt},
                    {code:'FR', val: product.fr},
                    {code:'PT', val: product.pt}
                ];
                
                countries.forEach(c => {
                    const checked = isDone(product.kods, c.code) ? 'checked' : '';
                    const disabled = c.val === 0 ? 'disabled' : '';
                    html += `
                        <td class="px-6 py-5 text-center">
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-sm font-medium ${c.val > 0 ? 'text-emerald-400' : 'text-zinc-500'}">${c.val}</span>
                                ${c.val > 0 ? `
                                <input type="checkbox" ${checked} ${disabled}
                                    onchange="toggleDone('${product.kods}', '${c.code}', this)"
                                    class="w-5 h-5 accent-amber-400 cursor-pointer">
                                ` : ''}
                            </div>
                        </td>
                    `;
                });
                
                html += `
                    <td class="px-8 py-5 text-center font-bold text-lg text-amber-400">${product.kopa}</td>
                `;
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
                
                // Apply strikethrough if all done
                updateRowStyle(product.kods);
            });
        }

        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!term) {
                renderTable(allProducts);
                return;
            }
            const filtered = allProducts.filter(p => 
                p.kods.toLowerCase().includes(term) || 
                p.kafija.toLowerCase().includes(term)
            );
            renderTable(filtered);
        }

        function clearAllProgress() {
            if (confirm("Clear all progress? This cannot be undone.")) {
                progress = {};
                saveProgress();
                renderTable(allProducts);
            }
        }

        // Initialize
        window.onload = () => {
            loadProgress();
            loadData();
        };
    </script>
</body>
</html>
